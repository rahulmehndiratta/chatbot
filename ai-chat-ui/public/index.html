<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: system-ui;
      background: #0f172a;
      color: white;
    }

    #sidebar {
      width: 260px;
      background: #020617;
      border-right: 1px solid #1e293b;
      display: flex;
      flex-direction: column;
    }

    #newChat {
      padding: 12px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

  .chatItem {
    padding: 12px;
    border-bottom: 1px solid #1e293b;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.2s;
  }

  .chatItem:hover {
    background: #1e293b;
  }

  .chatItem.active {
    background: #1e293b;
  }

    .deleteBtn {
      color: #ef4444;
      cursor: pointer;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #header {
      padding: 12px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

  .msg {
    max-width: 65%;
    padding: 12px 14px;
    border-radius: 14px;
    line-height: 1.5;
    font-size: 14px;
    position: relative;
    animation: fadeIn 0.2s ease-in;
  }

  .user {
    background: #2563eb;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .bot {
    background: #1e293b;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  /* smooth animation */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #inputArea {
  display: flex;
  padding: 14px;
  border-top: 1px solid #1e293b;
  background: #020617;
  gap: 10px;
}

textarea {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  background: #1e293b;
  color: white;
  border: none;
  font-size: 14px;
  box-shadow: inset 0 0 0 1px #334155;
}

textarea:focus {
  outline: none;
  box-shadow: inset 0 0 0 1px #2563eb;
}

    button {
      margin-left: 10px;
      padding: 10px;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <button onclick="createNewChat()">+ New Chat</button>
  <div id="chatList"></div>
</div>

<div id="main">
  <div id="header">
    <div id="userInfo"></div>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="chat"></div>

  <div id="inputArea">
    <textarea id="input"></textarea>
    <button id="sendBtn" onclick="send()">Send</button>
  </div>
</div>

<script>

let chats = JSON.parse(localStorage.getItem("chats") || "[]");
let currentSession = null;
let isLoading = false;

// ---------- USER ----------
function showUser() {
  const token = localStorage.getItem("token");
  if (!token) window.location.href = "/login.html";

  const data = JSON.parse(atob(token.split('.')[1]));
  document.getElementById("userInfo").innerText = "👤 " + data.sub;
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "/login.html";
}

// ---------- CHAT ----------
function createNewChat() {
  const id = "chat_" + Date.now();
  chats.unshift({ id, title: "New Chat" });
  saveChats();
  loadChat(id);
}

function saveChats() {
  localStorage.setItem("chats", JSON.stringify(chats));
}

function renderChatList() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  chats.forEach(chat => {
    const div = document.createElement("div");
    div.className = "chatItem";

    const title = document.createElement("span");
    title.innerText = chat.title;

    // rename on double click
    title.ondblclick = () => {
      const newName = prompt("Rename chat:", chat.title);
      if (newName) {
        chat.title = newName;
        saveChats();
        renderChatList();
      }
    };

    title.onclick = () => loadChat(chat.id);

    const del = document.createElement("span");
    del.innerText = "🗑";
    del.className = "deleteBtn";

    del.onclick = (e) => {
      e.stopPropagation();

      if (confirm("Delete this chat?")) {
        chats = chats.filter(c => c.id !== chat.id);
        saveChats();

        if (currentSession === chat.id) {
          div.classList.add("active");
          createNewChat();
        } else {
          renderChatList();
        }
      }
    };

    div.appendChild(title);
    div.appendChild(del);
    list.appendChild(div);
  });
}

async function loadChat(sessionId) {
  currentSession = sessionId;
  document.getElementById("chat").innerHTML = "";
  document.getElementById("chat").style.scrollBehavior = "smooth";
  const res = await fetch(`http://127.0.0.1:8000/history/${sessionId}`, {
    headers: {
      "Authorization": "Bearer " + localStorage.getItem("token")
    }
  });

  if (res.status === 401) {
    localStorage.removeItem("token");
    window.location.href = "/login.html";
    return;
  }

  const data = await res.json();

  (data.history || []).forEach(msg => {
    addMessage(msg.content, msg.role === "user" ? "user" : "bot");
  });

  renderChatList();
}

function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

// ---------- SEND ----------
async function send() {
  if (isLoading) return;

  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  if (!currentSession) createNewChat();

  isLoading = true;
  document.getElementById("sendBtn").disabled = true;

  input.value = "";

  addMessage(message, "user");

  // 🔥 AUTO TITLE SET
  const chatIndex = chats.findIndex(c => c.id === currentSession);
  if (chatIndex !== -1 && chats[chatIndex].title === "New Chat") {
    chats[chatIndex].title = message.substring(0, 25);
    saveChats();
    renderChatList();
  }

  const botMsg = addMessage("...", "bot");
botMsg.style.opacity = "0.6";   

  try {
    const res = await fetch("http://127.0.0.1:8000/chat-stream", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + localStorage.getItem("token")
      },
      body: JSON.stringify({
        question: message,
        session_id: currentSession
      })
    });

    if (res.status === 401) {
  localStorage.removeItem("token");
  window.location.href = "/login.html";
  return;
}

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    let full = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      full += chunk;
      botMsg.innerText = full;
    }

  } catch {
    botMsg.innerText = "Error";
  } finally {
    isLoading = false;
    document.getElementById("sendBtn").disabled = false;
  }
}

// ---------- INIT ----------
showUser();
if (chats.length === 0) createNewChat();
else loadChat(chats[0].id);

</script>

</body>
</html>
