<!DOCTYPE html>
<html>
<head>
  <title>Auth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
    }

    /* Layout */
    .container {
      display: flex;
      width: 100%;
    }

    /* LEFT SIDE (VISUAL) */
    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      background: radial-gradient(circle at top, #1e3a8a, #020617);
    }

    .left h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    .left p {
      color: #94a3b8;
      max-width: 400px;
    }

    .illustration {
      margin-top: 40px;
      width: 100%;
      max-width: 350px;
      border-radius: 12px;
      opacity: 0.9;
    }

    /* RIGHT SIDE (FORM) */
    .right {
      width: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #020617;
    }

    .card {
      width: 280px;
    }

    h2 {
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 25px;
    }

    /* Inputs */
    .input-group {
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      font-size: 14px;
    }

    input:focus {
      outline: 2px solid #2563eb;
    }

    /* Button */
    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 15px rgba(37,99,235,0.4);
    }

    .switch {
      text-align: center;
      margin-top: 15px;
      color: #60a5fa;
      cursor: pointer;
      font-size: 13px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .left {
        display: none;
      }
      .right {
        width: 100%;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <h1>AI Chat Platform 🚀</h1>
    <p>Experience real-time AI conversations with memory, streaming, and smart responses.</p>

    <img class="illustration" 
      src="https://images.unsplash.com/photo-1677442136019-21780ecad995?q=80&w=800" />
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <div class="card">

      <h2 id="title">Welcome Back</h2>
      <div class="subtitle" id="subtitle">Login to continue</div>

      <div class="input-group">
        <input id="username" placeholder="Username" />
      </div>

      <div class="input-group">
        <input id="password" type="password" placeholder="Password" />
      </div>

      <button onclick="submit()" id="btn">Login</button>

      <div class="switch" onclick="toggleMode()" id="switchText">
        Don’t have an account? Signup
      </div>

    </div>
  </div>

</div>

<script>

let isLogin = true;

function toggleMode() {
  isLogin = !isLogin;

  if (isLogin) {
    title.innerText = "Welcome Back";
    subtitle.innerText = "Login to continue";
    btn.innerText = "Login";
    switchText.innerText = "Don’t have an account? Signup";
  } else {
    title.innerText = "Create Account";
    subtitle.innerText = "Start your journey";
    btn.innerText = "Signup";
    switchText.innerText = "Already have an account? Login";
  }
}

async function submit() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const url = isLogin ? "/login" : "/signup";

  const res = await fetch("http://127.0.0.1:8000" + url, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (isLogin) {
    if (data.token) {
      localStorage.setItem("token", data.token);
      window.location.href = "/";
    } else {
      alert("Login failed");
    }
  } else {
    alert("Signup successful. Please login.");
    toggleMode();
  }
}

</script>

</body>
</html>
